<section class="auth-page d-flex justify-content-center align-items-center min-vh-100 px-3">
  <div class="auth-card">
    <h1 class="h3 text-center mb-4">Iniciar sesión</h1>
    <form>
      <div class="mb-4">
        <label for="loginEmail" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" />
      </div>
      <div class="mb-4">
        <label for="loginPassword" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="loginPassword" placeholder="Contraseña" />
      </div>
      <button type="button" class="btn btn-dark btn-lg w-100">Iniciar sesión</button>
    </form>
  </div>
</section>
