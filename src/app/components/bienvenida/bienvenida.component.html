<section class="home-container d-flex justify-content-center align-items-center min-vh-100 px-3">

  <div class="home-card text-center">

    <!-- Loading -->
    @if (loading()) {
      <p class="text-muted">Cargando...</p>
    }

    <!-- LOGUEADO -->
    @if (!loading() && user()) {

      <h1 class="mb-3">
        🎮 Bienvenido {{ profile()?.nombre }} {{ profile()?.apellido }} 🎮
      </h1>

      <p class="text-white mb-4">
        Estás logueado como {{ profile()?.nombre }}
      </p>

      <!-- LOGOUT -->
      <button type="button" class="btn btn-danger w-100 mb-4" (click)="cerrarSesion()">
        Cerrar sesión
      </button>

      <hr class="text-white" />

      <h5 class="mb-3">🎮 Juegos disponibles</h5>

      <div class="d-grid gap-3">

        <button type="button" class="btn btn-dark" (click)="irAJuego('/ahorcado')">
          🪢 Ahorcado
        </button>

        <button type="button" class="btn btn-dark" (click)="irAJuego('/mayor-menor')">
          🃏 Mayor o Menor
        </button>

        <button type="button" class="btn btn-dark" (click)="irAJuego('/preguntados')">
          ❓ Preguntados
        </button>

        <button type="button" class="btn btn-dark" (click)="irAJuego('/wordle')">
          🎯 Wordle
        </button>

        <button type="button" class="btn btn-dark" (click)="irAJuego('/chat')">
          💬 Chat global
        </button>

        <hr class="text-white" />

        <button type="button" class="btn btn-outline-light" (click)="irAJuego('/resultados')">
          📊 Ver resultados
        </button>

      </div>

    }

    <!-- NO LOGUEADO -->
    @if (!loading() && !user()) {

      <h1 class="mb-3">🎮 Bienvenido 🎮</h1>

      <p class="text-white mb-4">
        Iniciá sesión o registrate para continuar
      </p>

      <div class="d-grid gap-3">

        <button type="button" class="btn btn-dark" (click)="irAJuego('/login')">
          Iniciar sesión
        </button>

        <button type="button" class="btn btn-outline-dark" (click)="irAJuego('/registro')">
          Registrarse
        </button>

      </div>

    }

  </div>

</section>
