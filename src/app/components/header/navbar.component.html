<header class="navbar navbar-expand-lg navbar-light shadow-sm border-bottom">
  <div class="container">

    <button class="navbar-toggler ms-auto" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation">

      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">

      <div class="nav gap-3">

        <a routerLink="/home"
           routerLinkActive="active"
           class="btn navbar-btn">
          Home
        </a>

        <a routerLink="/quien-soy"
           routerLinkActive="active"
           class="btn navbar-btn">
          Quién soy
        </a>

        @if (!user()) {
          <a routerLink="/login"
             routerLinkActive="active"
             class="btn navbar-btn">
            Login
          </a>

          <a routerLink="/registro"
             routerLinkActive="active"
             class="btn navbar-btn">
            Registro
          </a>
        }

        @if (user()) {
          <button class="btn btn-outline-dark navbar-btn" (click)="logout()">
            Logout
          </button>
        }

      </div>

    </div>

  </div>
</header>
