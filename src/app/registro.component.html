<section class="auth-page d-flex justify-content-center align-items-center min-vh-100 px-3">
  <div class="auth-card">
    <h1 class="h3 text-center mb-4">Registro</h1>
    <form>
      <div class="mb-4">
        <label for="registerName" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="registerName" placeholder="Nombre completo" />
      </div>
      <div class="mb-4">
        <label for="registerEmail" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="registerEmail" placeholder="tu@email.com" />
      </div>
      <div class="mb-4">
        <label for="registerPassword" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="registerPassword" placeholder="Contraseña" />
      </div>
      <button type="button" class="btn btn-dark btn-lg w-100">Registrarse</button>
    </form>
  </div>
</section>
